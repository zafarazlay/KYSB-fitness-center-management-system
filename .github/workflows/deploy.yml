name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Create frontend .env file
      run: |
        cat > frontend/.env << EOF
        VITE_SUPABASE_URL=https://nhjkrzumsjaefrppblyn.supabase.co
        VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oamtyenVtc2phZWZycHBibHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NTk1NjMsImV4cCI6MjA5NzUzNTU2M30.08DOS1xb0hgGFFvhAy5FJH-NX8-TsDjIij9Fv0h1q8M
        VITE_API_URL=http://localhost:5000/api
        VITE_APP_NAME=KYSB Fitness Center Management System
        EOF

    - name: Install frontend dependencies
      run: npm install --prefix frontend

    - name: Build frontend
      run: npm run build --prefix frontend

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages
        folder: frontend/dist
        clean: true
