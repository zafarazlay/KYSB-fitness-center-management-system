name: CI/CD Pipeline

on:
  push:
    branches: [ agents/smoggy-scallop, main, develop ]
  pull_request:
    branches: [ agents/smoggy-scallop, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build frontend
      run: |
        cd frontend
        npm install
        npm run build

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      continue-on-error: true

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/agents/smoggy-scallop'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker images
      run: |
        docker build -f docker/Dockerfile.backend -t akysb-backend:latest .
        docker build -f docker/Dockerfile.frontend -t akysb-frontend:latest .

  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Security audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    - name: Check code formatting
      run: |
        cd frontend
        npm install
        npm run lint || true

  publish:
    needs: [build, quality]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/agents/smoggy-scallop'

    steps:
    - uses: actions/checkout@v3

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        body: |
          ## Changes in this Release
          - AKYSB Fitness Center Management System
          - Membership Tiers System Implementation
          - Full CRUD for Members
          - Payment Management System
          
          ### Features
          - ✅ Member Management
          - ✅ Membership Tiers (Kids, Adults, Seniors, Custom)
          - ✅ Payment Tracking
          - ✅ Admin Dashboard
          - ✅ Financial Reporting
          
          ### Tech Stack
          - React.js 18.2
          - Express.js
          - PostgreSQL
          - Tailwind CSS
          
          **[View on GitHub](https://github.com/${{ github.repository }})**
        draft: false
        prerelease: false
